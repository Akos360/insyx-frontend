<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="gc">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
    <radialGradient id="gg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#1e4d7a"/>
      <stop offset="100%" stop-color="#071828"/>
    </radialGradient>
    <radialGradient id="gh" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#4a9fc8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4a9fc8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Globe body -->
  <circle cx="16" cy="16" r="15" fill="url(#gg)"/>

  <!-- Grid lines clipped to globe -->
  <g clip-path="url(#gc)" fill="none" stroke="#6aaccc" stroke-width="0.85">
    <!-- Equator -->
    <line x1="1" y1="16" x2="31" y2="16" opacity="0.9"/>
    <!-- Upper latitude -->
    <ellipse cx="16" cy="10" rx="13.2" ry="2.4" opacity="0.55"/>
    <!-- Lower latitude -->
    <ellipse cx="16" cy="22" rx="13.2" ry="2.4" opacity="0.55"/>
    <!-- Central meridian -->
    <ellipse cx="16" cy="16" rx="5.5" ry="15" opacity="0.8"/>
    <!-- Side meridian -->
    <ellipse cx="16" cy="16" rx="11.5" ry="15" opacity="0.4"/>
  </g>

  <!-- Specular highlight -->
  <circle cx="16" cy="16" r="15" fill="url(#gh)"/>

  <!-- Border -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#5a9dc0" stroke-width="1"/>
</svg>
